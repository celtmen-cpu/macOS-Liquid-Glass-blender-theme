<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blender Resources | Digital Assets</title>
  <link rel="icon" href="https://images.icon-icons.com/4029/PNG/512/twitter_x_new_logo_x_rounded_icon_256078.png" type="image/png">
  
  <style>
    :root {
      --bg: #0b0f1a;
      --card: rgba(23, 32, 53, 0.8);
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --success: #10b981;
      --border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle at 50% -20%, #1e293b, #0b0f1a);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container { width: 100%; max-width: 750px; }

    header { text-align: center; margin-bottom: 50px; }
    h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; color: #fff; }
    .tagline { color: var(--text-muted); font-size: 1.1rem; }

    h2 { 
      font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; 
      color: var(--accent); margin: 40px 0 20px; display: flex; align-items: center; gap: 15px;
    }
    h2::after { content: ""; height: 1px; flex: 1; background: var(--border); }

    .resource-list { display: flex; flex-direction: column; gap: 15px; }

    .card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }
    .card:hover { 
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.5);
    }

    .info h3 { font-size: 1.15rem; margin-bottom: 5px; }
    .info p { font-size: 0.85rem; color: var(--text-muted); }

    .dl-btn {
      background: var(--accent);
      color: white !important;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9rem;
      transition: 0.2s;
      border: none;
      cursor: pointer;
    }
    .dl-btn:hover { background: var(--accent-hover); transform: scale(1.05); }

    /* Formulaire */
    form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    input, textarea {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    
    .submit-btn {
      background: var(--success);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 10px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
    }
    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    #status { text-align: center; margin-top: 10px; font-weight: 600; font-size: 0.9rem; }

    @media (max-width: 600px) {
      .card { flex-direction: column; text-align: center; gap: 20px; }
      .dl-btn { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Blender Resources</h1>
      <p class="tagline">Boostez votre créativité avec mes thèmes et addons.</p>
    </header>

    <h2>🎨 Thèmes</h2>
    <div class="resource-list">
      <div class="card">
        <div class="info">
          <h3>MacOS Dark Liquid Glass</h3>
          <p>Format: .zip | Version: 1.0</p>
        </div>
        <a href="versions/theme/liquid_glass_theme_1.0.zip" class="dl-btn" onclick="handleDownload(event, '🎨 Thème: MacOS Dark Liquid Glass')">Download</a>
      </div>
    </div>

    <h2>⚙️ Addons</h2>
    <div class="resource-list">
      <div class="card">
        <div class="info">
          <h3>Social Network Presets</h3>
          <p>Format: .zip | Pour Blender 3.6+</p>
        </div>
        <a href="versions/addons/dimensions_presets.zip" class="dl-btn" onclick="handleDownload(event, '⚙️ Addon: Social Network Presets')">Download</a>
      </div>
    </div>

    <h2>💬 Feedback</h2>
    <form id="feedbackForm">
      <input type="text" id="itemName" placeholder="Nom du produit testé" required>
      <textarea id="itemReview" rows="4" placeholder="Votre avis ou signalement de bug..." required></textarea>
      <button type="submit" class="submit-btn">Envoyer mon retour</button>
      <p id="status"></p>
    </form>
  </div>

  <script>
    const CONFIG = {
      webhook: "https://discord.com/api/webhooks/1485923983558705164/H5fJ7BT-xKHEQc9g1TeDt1Os04QMQ3g-rR4sJVD4kg0yFHv_FSSW9gK6pDJxNYyQ4bC5"
    };

    // Fonction d'envoi POST (Utilisée pour les clics et le formulaire)
    async function sendToDiscord(payload) {
      try {
        await fetch(CONFIG.webhook, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch (err) {
        console.error("Erreur d'envoi Webhook:", err);
      }
    }

    // Gestion des téléchargements
    async function handleDownload(event, resourceName) {
      event.preventDefault();
      const targetUrl = event.currentTarget.href;

      // Envoi du log au Discord sous forme d'Embed (plus pro)
      await sendToDiscord({
        embeds: [{
          title: "🚀 Nouveau Téléchargement",
          description: `Ressource : **${resourceName}**`,
          color: 3869830, // Bleu
          timestamp: new Date()
        }]
      });

      // Délai pour s'assurer que la requête est partie
      setTimeout(() => { window.location.href = targetUrl; }, 150);
    }

    // Gestion du formulaire de retour
    document.getElementById('feedbackForm').onsubmit = async (e) => {
      e.preventDefault();
      const status = document.getElementById('status');
      const name = document.getElementById('itemName').value;
      const review = document.getElementById('itemReview').value;

      status.style.color = "var(--accent)";
      status.innerText = "Transmission en cours...";

      await sendToDiscord({
        embeds: [{
          title: "⭐ Nouveau Feedback Reçu",
          fields: [
            { name: "Produit", value: name, inline: true },
            { name: "Commentaire", value: review }
          ],
          color: 16766720, // Or
          timestamp: new Date()
        }]
      });

      status.style.color = "var(--success)";
      status.innerText = "✅ Merci ! Votre avis a été envoyé.";
      e.target.reset();
    };
  </script>

</body>
</html>
