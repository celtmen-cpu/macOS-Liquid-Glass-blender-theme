<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blender Resources</title>
  <link rel="icon" href="https://images.icon-icons.com/4029/PNG/512/twitter_x_new_logo_x_rounded_icon_256078.png" type="image/png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #2c3e50;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { text-align: center; margin-bottom: 20px; font-size: 2em; color: #34495e; }
    h2 { width: 100%; font-size: 1.4em; color: #34495e; margin: 30px 0 15px; border-bottom: 2px solid #2980b9; padding-bottom: 5px; }
    p { margin: 10px 0 20px; text-align: center; }
    a { text-decoration: none; color: #2980b9; font-weight: bold; transition: 0.3s; }
    a:hover { color: #1abc9c; }

    ul {
      list-style: none;
      width: 100%;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    li {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
      flex-wrap: wrap;
    }
    li:hover { background: rgba(255, 255, 255, 0.35); transform: translateY(-2px); }
    .addon-name { font-size: 1em; margin-bottom: 5px; flex: 1 1 60%; font-weight: bold; }
    .download-btn {
      background: #2980b9;
      color: #fff !important;
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.3s;
      cursor: pointer;
    }
    .download-btn:hover { background: #1abc9c; }

    #reviewForm {
      width: 100%;
      max-width: 600px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }
    #reviewForm input, #reviewForm textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    #reviewForm button { width: fit-content; padding: 10px 15px; border-radius: 8px; border: none; background: #2980b9; color: white; font-weight: bold; cursor: pointer; }
    #status { margin-top: 10px; text-align: center; font-weight: bold; }

    @media (max-width: 600px) {
      li { flex-direction: column; align-items: flex-start; }
      .addon-name { flex: 1 1 100%; margin-bottom: 10px; }
    }
  </style>
</head>
<body>

<h1>My Blender Resources</h1>
<p>Download my Blender themes and addons below.</p>

<h2>Themes</h2>
<ul>
  <li>
    <div class="addon-name">MacOS Dark Liquid Glass Theme</div>
    <a href="versions/theme/liquid_glass_theme_1.0.zip" class="download-btn" onclick="handleDownload(event, 'MacOS Dark Liquid Glass Theme')">Download</a>
  </li>
</ul>

<h2>Addons</h2>
<ul>
  <li>
    <div class="addon-name">Dimension presets for social networks</div>
    <a href="versions/addons/dimensions_presets.zip" class="download-btn" onclick="handleDownload(event, 'Dimension presets for social networks')">Download</a>
  </li>
</ul>

<h2>Leave a Review</h2>
<form id="reviewForm">
  <input type="text" id="addonName" placeholder="Addon or Theme Name" required>
  <textarea id="reviewMessage" placeholder="Your comment" rows="5" required></textarea>
  <button type="submit">Send Review</button>
  <p id="status"></p>
</form>

<script>
// TON URL DE WEBHOOK
const webhookURL = "https://discord.com/api/webhooks/1485923983558705164/H5fJ7BT-xKHEQc9g1TeDt1Os04QMQ3g-rR4sJVD4kg0yFHv_FSSW9gK6pDJxNYyQ4bC5";

// Fonction d'envoi générique
async function sendToDiscord(msg) {
  try {
    await fetch(webhookURL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: msg })
    });
  } catch (e) {
    console.error("Erreur d'envoi Discord", e);
  }
}

// GESTION DES CLICS SUR TÉLÉCHARGEMENT
function handleDownload(event, name) {
  event.preventDefault(); // On bloque le lien une fraction de seconde
  const link = event.currentTarget.href;

  // Envoi du message au Discord
  sendToDiscord(`📥 **Nouveau téléchargement** : ${name}`);

  // On lance le téléchargement après 250ms pour être sûr que la requête est partie
  setTimeout(() => {
    window.location.href = link;
  }, 250);
}

// GESTION DU FORMULAIRE DE REVIEW
document.getElementById("reviewForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const item = document.getElementById("addonName").value;
  const comment = document.getElementById("reviewMessage").value;

  sendToDiscord(`⭐ **Avis reçu sur ${item}** :\n> ${comment}`);

  document.getElementById("status").innerText = "✅ Review sent!";
  this.reset();
});
</script>

</body>
</html>
