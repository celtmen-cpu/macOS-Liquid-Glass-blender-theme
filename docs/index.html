<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blender Resources</title>
  <link rel="icon" href="https://images.icon-icons.com/4029/PNG/512/twitter_x_new_logo_x_rounded_icon_256078.png" type="image/png">
  <style>
    /* Ton CSS existant */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #2c3e50; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    h1 { text-align: center; margin-bottom: 20px; font-size: 2em; color: #34495e; }
    h2 { width: 100%; font-size: 1.4em; color: #34495e; margin: 30px 0 15px; border-bottom: 2px solid #2980b9; padding-bottom: 5px; }
    p { margin: 10px 0 20px; text-align: center; }
    a { text-decoration: none; color: #2980b9; font-weight: bold; transition: 0.3s; }
    ul { list-style: none; width: 100%; padding: 0; display: flex; flex-direction: column; gap: 15px; }
    li { background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(10px); border-radius: 15px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: 0.3s; }
    .addon-name { font-size: 1em; flex: 1 1 60%; }
    .download-btn { background: #2980b9; color: #fff; padding: 8px 12px; border-radius: 8px; transition: 0.3s; cursor: pointer; border: none; }
    .download-btn:hover { background: #1abc9c; }
    #reviewForm { width: 100%; max-width: 600px; background: rgba(255,255,255,0.25); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    #reviewForm input, #reviewForm textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    #reviewForm button { padding: 10px 15px; border-radius: 8px; border: none; background: #2980b9; color: white; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

<h1>My Blender Resources</h1>

<h2>Themes</h2>
<ul>
  <li>
    <div class="addon-name">MacOS Dark Liquid Glass Theme</div>
    <a href="versions/theme/liquid_glass_theme_1.0.zip" class="download-btn" data-name="MacOS Dark Liquid Glass Theme" download>Download</a>
  </li>
</ul>

<h2>Addons</h2>
<ul>
  <li>
    <div class="addon-name">Dimension presets for social networks</div>
    <a href="versions/addons/dimensions_presets.zip" class="download-btn" data-name="Dimension presets for social networks" download>Download</a>
  </li>
</ul>

<h2>Leave a Review</h2>
<form id="reviewForm">
  <input type="text" id="addonName" placeholder="Addon or Theme Name" required>
  <textarea id="reviewMessage" placeholder="Your comment" rows="5" required></textarea>
  <button type="submit">Send Review</button>
  <p id="status"></p>
</form>

<script>
  // Configuration du Webhook
  const webhookURL = "https://discord.com/api/webhooks/1485923983558705164/H5fJ7BT-xKHEQc9g1TeDt1Os04QMQ3g-rR4sJVD4kg0yFHv_FSSW9gK6pDJxNYyQ4bC5";

  // Fonction universelle d'envoi
  async function notifyDiscord(message) {
    try {
      await fetch(webhookURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: message })
      });
    } catch (err) {
      console.error("Erreur d'envoi Discord:", err);
    }
  }

  // --- Écouteur pour les TÉLÉCHARGEMENTS ---
  document.addEventListener('click', function(e) {
    // Si l'élément cliqué est un bouton de téléchargement
    if (e.target && e.target.classList.contains('download-btn')) {
      const fileName = e.target.getAttribute('data-name') || "Fichier inconnu";
      notifyDiscord(`🚀 **Nouveau téléchargement** : ${fileName}`);
    }
  });

  // --- Écouteur pour le FORMULAIRE ---
  document.getElementById("reviewForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const name = document.getElementById("addonName").value;
    const msg = document.getElementById("reviewMessage").value;

    notifyDiscord(`⭐ **Nouvel avis sur ${name}** :\n"${msg}"`);
    
    document.getElementById("status").innerText = "✅ Merci ! Envoyé au Discord.";
    this.reset();
  });
</script>

</body>
</html>
